<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="./manifest.json">

  <meta name="mobile-web-app-capable" content="yes">

  <meta name="theme-color" content="#222222">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Дела">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

  <link rel="icon" href="./icons/favicon-32x32.png" type="image/png">

  <title>Список дел</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #aaa;
      background: #fff;
      font-family: monospace;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #222;
    }

    button {
      padding: 8px 14px;
      background: #222;
      color: #fff;
      border: none;
      font-family: monospace;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover { background: #444; }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #ddd;
      font-size: 0.95rem;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li input[type="checkbox"] {
      cursor: pointer;
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    li span { flex: 1; }

    li .del {
      background: none;
      color: #aaa;
      font-size: 1rem;
      padding: 0 4px;
      line-height: 1;
    }

    li .del:hover { color: #c00; background: none; }

    .empty {
      color: #aaa;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    #status {
      font-size: 0.75rem;
      color: #888;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Список дел</h1>
    <div class="form">
      <input type="text" id="task-input" placeholder="Новая задача..." maxlength="200">
      <button id="add-btn">Добавить</button>
    </div>
    <ul id="tasks-list"></ul>
    <p id="status"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
