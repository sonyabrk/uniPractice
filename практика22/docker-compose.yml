version: "3.8"

services:
  backend1:
    build:
      context: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=backend-1
    ports:
      - "3000:3000"

  backend2:
    build:
      context: ./backend
    environment:
      - PORT=3001
      - SERVER_ID=backend-2
    ports:
      - "3001:3001"

  backend3:
    build:
      context: ./backend
    environment:
      - PORT=3002
      - SERVER_ID=backend-3
    ports:
      - "3002:3002"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3

  haproxy:
    image: haproxy:latest
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - backend1
      - backend2
      - backend3