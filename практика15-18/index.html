<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEMO">
  <link rel="icon" href="/icons/favicon-32x32.png" type="image/png">
  <title>MEMO — Список дел</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #222222;
      --accent:    #d4f542;
      --accent2:   #42f5a1;
      --text:      #e8e8e8;
      --muted:     #555555;
      --danger:    #ff3b3b;
      --success:   #42f5a1;
      --font-mono: 'Space Mono', monospace;
      --font-disp: 'Bebas Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* App Shell: шапка — кэшируется, грузится мгновенно */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: stretch;
    }

    .logo {
      font-family: var(--font-disp);
      font-size: 2.4rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      padding: 14px 24px 14px 0;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      line-height: 1;
      display: flex;
      align-items: center;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      padding-left: 24px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      gap: 8px;
    }

    .sw-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .sw-dot.active { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .sw-dot.error  { background: var(--danger); }

    /* App Shell: навигация — часть каркаса */
    nav {
      border-bottom: 1px solid var(--border);
      display: flex;
    }

    .tab {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: var(--muted);
      padding: 12px 24px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Тикер */
    .ticker-wrap {
      overflow: hidden;
      background: var(--accent);
      padding: 5px 0;
    }

    .ticker {
      display: flex;
      animation: ticker 22s linear infinite;
      white-space: nowrap;
    }

    .ticker span {
      font-family: var(--font-disp);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--bg);
      padding: 0 28px;
    }

    .ticker span::before { content: '◆'; margin-right: 28px; }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* App Shell: основной контейнер — куда грузится динамический контент */
    #app-content {
      flex: 1;
      padding: 40px 24px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* Скелетон загрузки (часть App Shell) */
    .skeleton {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 40px;
    }
    .skeleton-line {
      height: 18px;
      background: var(--surface);
      border-radius: 2px;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line.wide  { width: 60%; }
    .skeleton-line.short { width: 35%; }
    .skeleton-line.full  { width: 100%; }

    @keyframes shimmer {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* Footer с кнопками push */
    footer {
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .push-btns {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-push {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-push.enable:hover  { border-color: var(--accent2); color: var(--accent2); }
    .btn-push.disable:hover { border-color: var(--danger); color: var(--danger); }

    /* Всплывающее WS-уведомление */
    .ws-toast {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #1a1a2e;
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      font-size: 0.8rem;
      z-index: 9999;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    .ws-toast strong { color: var(--accent); display: block; margin-bottom: 4px; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      header { padding: 0 12px; }
      .logo  { font-size: 1.8rem; padding-right: 14px; }
      #app-content { padding: 24px 14px; }
    }
  </style>
</head>
<body>

  <!-- ===== APP SHELL START (кэшируется, грузится мгновенно) ===== -->
  <header>
    <div class="logo">MEMO</div>
    <div class="header-status">
      <div class="sw-dot" id="sw-dot"></div>
      <span id="status">инициализация</span>
    </div>
  </header>

  <nav>
    <button class="tab active" id="home-btn">Главная</button>
    <button class="tab" id="about-btn">О приложении</button>
  </nav>

  <div class="ticker-wrap">
    <div class="ticker">
      <span>Offline First</span>
      <span>PWA</span>
      <span>App Shell</span>
      <span>Service Worker</span>
      <span>WebSocket</span>
      <span>Push Notifications</span>
      <span>HTTPS</span>
      <span>localStorage</span>
      <span>Offline First</span>
      <span>PWA</span>
      <span>App Shell</span>
      <span>Service Worker</span>
      <span>WebSocket</span>
      <span>Push Notifications</span>
      <span>HTTPS</span>
      <span>localStorage</span>
    </div>
  </div>

  <!-- Динамический контент (загружается через fetch) -->
  <main id="app-content">
    <div class="skeleton">
      <div class="skeleton-line wide"></div>
      <div class="skeleton-line short"></div>
      <div class="skeleton-line full"></div>
      <div class="skeleton-line full"></div>
    </div>
  </main>

  <footer>
    <span>MEMO PWA · App Shell · WebSocket · Push</span>
    <div class="push-btns">
      <button class="btn-push enable" id="enable-push">▲ Включить уведомления</button>
      <button class="btn-push disable" id="disable-push" style="display:none;">✕ Отключить уведомления</button>
    </div>
  </footer>
  
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
