<div class="home-content">
  <div class="page-title">
    ТВОИ<br>
    <em>ЗАДАЧИ</em><br>
    <span class="outline">НА СЕГОДНЯ</span>
  </div>

  <div class="form-block">
    <div class="form-label">Быстрая заметка</div>
    <div class="add-form" id="note-form-wrap">
      <input type="text" id="task-input" placeholder="Новая задача..." maxlength="200" autocomplete="off">
      <button id="add-btn">+ Добавить</button>
    </div>
  </div>

  <div class="form-block">
    <div class="form-label">С напоминанием <span class="form-label-badge">⏰ Push</span></div>
    <div class="add-form reminder-form-wrap">
      <input type="text" id="reminder-text" placeholder="Текст напоминания..." maxlength="200" autocomplete="off">
      <input type="datetime-local" id="reminder-time" title="Дата и время напоминания">
      <button id="reminder-btn">+ Добавить с напоминанием</button>
    </div>
  </div>

  <div class="tasks-header">
    <span class="tasks-label">Всего задач</span>
    <span class="tasks-count" id="tasks-count">0</span>
    <span class="tasks-label" style="margin-left:24px;">Выполнено</span>
    <span class="tasks-count" id="done-count" style="color: var(--accent2)">0</span>
    <span class="tasks-label" style="margin-left:24px;">Напоминаний</span>
    <span class="tasks-count" id="reminder-count" style="color: #f5a542">0</span>
  </div>

  <ul id="tasks-list"></ul>
</div>

<style>
  .page-title {
    font-family: var(--font-disp);
    font-size: clamp(3rem, 8vw, 5rem);

    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
  }

    margin-bottom: 20px;

    animation-fill-mode: forwards;
  }

    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-label-badge {
    background: rgba(245,165,66,0.15);
    color: #f5a542;
    border: 1px solid rgba(245,165,66,0.3);
    padding: 1px 7px;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
  }

    display: flex;
    gap: 0;
    border: 1px solid var(--border);
  }

    background: var(--surface);

    font-size: 0.86rem;
    color: var(--text);
    transition: background 0.2s;
  }

    border-left: 1px solid var(--border);
