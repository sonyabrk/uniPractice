<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
</head>
<body>
    <h2>Вход</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required><br><br>
        <input type="password" id="loginPassword" placeholder="Пароль" required><br><br>
        <button type="submit">Войти</button>
    </form>
    <p id="loginResult"></p>
    <p id="tokenResult"></p>

    <hr>

    <h2>Регистрация</h2>
    <form id="registerForm">
        <input type="text" id="regFirstName" placeholder="Имя" required><br><br>
        <input type="text" id="regLastName" placeholder="Фамилия" required><br><br>
        <input type="email" id="regEmail" placeholder="Email" required><br><br>
        <input type="password" id="regPassword" placeholder="Пароль" required><br><br>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p id="registerResult"></p>

    <script>
        const API_URL = 'http://localhost:3000/api/auth';

        // Вход
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            
            if (response.ok) {
                document.getElementById('loginResult').textContent = 'Успешный вход!';
                document.getElementById('tokenResult').textContent = 'Токен: ' + (data.accessToken || 'токен не получен');
            } else {
                document.getElementById('loginResult').textContent = 'Ошибка: ' + data.error;
            }
        };

        // Регистрация
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();
            const first_name = document.getElementById('regFirstName').value;
            const last_name = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const response = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ first_name, last_name, email, password })
            });

            const data = await response.json();
            
            if (response.ok) {
                document.getElementById('registerResult').textContent = 'Регистрация успешна! Теперь войдите.';
            } else {
                document.getElementById('registerResult').textContent = 'Ошибка: ' + data.error;
            }
        };
    </script>
</body>
</html>
